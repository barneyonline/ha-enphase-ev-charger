repos:
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
        args: [--check]
        files: "^(custom_components/enphase_ev|tests/components/enphase_ev)/.*\\.py$"
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        files: "^(custom_components/enphase_ev|tests/components/enphase_ev)/.*\\.py$"
