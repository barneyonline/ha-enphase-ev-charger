      docs:
        - README.md
  discovery-update-info:
    status: n/a
    comment: Cloud-only integration; it has no local discovery source whose network information can update existing entries.
    references:
      code:
        - custom_components/enphase_ev/manifest.json
      docs:
        - README.md
  discovery:
    status: n/a
    comment: Devices are discovered from the authenticated Enphase cloud account, not Home Assistant local discovery protocols.
    references:
      code:
        - custom_components/enphase_ev/config_flow.py
      docs:
        - README.md
  docs-data-update:
    status: done
    references:
