levels:
  bronze:
    required:
      - action-setup
      - appropriate-polling
      - brands
      - common-modules
      - config-flow-test-coverage
      - config-flow
      - dependency-transparency
      - docs-actions
      - docs-high-level-description
      - docs-installation-instructions
      - docs-removal-instructions
      - entity-event-setup
      - entity-unique-id
      - has-entity-name
      - runtime-data
      - test-before-configure
      - test-before-setup
      - unique-config-entry
  silver:
    required:
      - action-exceptions
      - config-entry-unloading
      - docs-configuration-parameters
      - docs-installation-parameters
      - entity-unavailable
      - integration-owner
      - log-when-unavailable
      - parallel-updates
      - reauthentication-flow
      - test-coverage
  gold:
    required:
      - devices
      - diagnostics
      - discovery-update-info
      - discovery
      - docs-data-update
      - docs-examples
      - docs-known-limitations
      - docs-supported-devices
      - docs-supported-functions
      - docs-troubleshooting
      - docs-use-cases
      - dynamic-devices
      - entity-category
      - entity-device-class
      - entity-disabled-by-default
      - entity-translations
      - exception-translations
      - icon-translations
      - reconfiguration-flow
      - repair-issues
      - stale-devices
  platinum:
    required:
      - async-dependency
      - inject-websession
      - strict-typing

rules:
  # Bronze
  action-setup:
    status: done
    references:
      code:
        - custom_components/enphase_ev/__init__.py
        - custom_components/enphase_ev/services.py
      tests:
        - tests/components/enphase_ev/test_services.py
        - tests/components/enphase_ev/test_init_module.py
  appropriate-polling:
    status: done
    references:
      code:
        - custom_components/enphase_ev/const.py
        - custom_components/enphase_ev/refresh_plan.py
        - custom_components/enphase_ev/refresh_runner.py
      tests:
        - tests/components/enphase_ev/test_coordinator_redesign.py
        - tests/components/enphase_ev/test_rate_limit_and_switch_kick.py
      docs:
        - README.md
  brands:
    status: done
    comment: Branding has been set up in home-assistant/brands and CI validates the remote brands repository/CDN assets.
    references:
      code:
        - custom_components/enphase_ev/manifest.json
        - hacs.json
        - .github/workflows/tests.yml
        - scripts/validate_quality_scale.py
      docs:
        - README.md
  common-modules:
    status: done
    references:
      code:
        - custom_components/enphase_ev/runtime_helpers.py
        - custom_components/enphase_ev/parsing_helpers.py
        - custom_components/enphase_ev/service_validation.py
      tests:
        - tests/components/enphase_ev/test_helper_modules.py
        - tests/components/enphase_ev/test_services.py
  config-flow-test-coverage:
    status: done
    references:
      code:
