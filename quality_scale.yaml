  stale-devices:
    status: done
    references:
      code:
        - custom_components/enphase_ev/__init__.py
        - custom_components/enphase_ev/entity_cleanup.py
      tests:
        - tests/components/enphase_ev/test_init_module.py
        - tests/components/enphase_ev/test_entity_cleanup.py
  async-dependency:
    status: done
    comment: The integration uses Home Assistant's event loop and aiohttp client session directly, with no synchronous third-party cloud dependency.
    references:
      code:
        - custom_components/enphase_ev/api.py
        - custom_components/enphase_ev/coordinator.py
      tests:
        - tests/components/enphase_ev/test_api_http_flow.py
        - tests/components/enphase_ev/test_coordinator_behavior.py
  inject-websession:
    status: done
    comment: The Enphase API helpers receive the Home Assistant shared aiohttp ClientSession via async_get_clientsession.
    references:
      code:
        - custom_components/enphase_ev/__init__.py
        - custom_components/enphase_ev/config_flow.py
        - custom_components/enphase_ev/coordinator.py
      tests:
        - tests/components/enphase_ev/test_config_flow_coverage.py
        - tests/components/enphase_ev/test_coordinator_behavior.py
  strict-typing:
    status: done
    comment: Runtime data uses a typed ConfigEntry alias without an Any fallback, the package is marked typed, and CI validates the strict config-entry contract with mypy.
    references:
      code:
        - .strict-typing
        - custom_components/enphase_ev/runtime_data.py
        - custom_components/enphase_ev/py.typed
        - scripts/validate_quality_scale.py
      tests:
        - tests/components/enphase_ev/test_runtime_data.py
        - tests/scripts/test_validate_quality_scale.py
