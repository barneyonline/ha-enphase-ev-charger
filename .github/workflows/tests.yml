name: Tests

on:
  pull_request:
    paths:
      - 'custom_components/**'
      - 'tests/components/enphase_ev/**'
      - '.pre-commit-config.yaml'
      - '.ruff.toml'
      - '.strict-typing'
      - 'devtools/docker/requirements-dev.txt'
      - 'quality_scale.yaml'
      - 'scripts/validate_quality_scale.py'
      - '.github/workflows/ci.yml'
      - '.github/workflows/tests.yml'
  workflow_dispatch:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

concurrency:
  group: ${{ format('{0}-{1}', github.workflow_ref || github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            .pre-commit-config.yaml
            .github/workflows/tests.yml
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
      - name: Run pre-commit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}" HEAD)"
            if printf '%s\n' "$changed_files" | grep -Eq '^(\.pre-commit-config\.yaml|\.ruff\.toml)$'; then
              pre-commit run --all-files
            else
              pre-commit run --from-ref "origin/${{ github.base_ref }}" --to-ref HEAD
            fi
          else
            pre-commit run --all-files
          fi

  translation-regressions:
    runs-on: ubuntu-latest
    needs: pre-commit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            devtools/docker/requirements-dev.txt
            .github/workflows/tests.yml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r devtools/docker/requirements-dev.txt aiohttp async-timeout voluptuous
      - name: Run translation regression tests
        run: |
          pytest -q tests/components/enphase_ev/test_service_translations.py

  quality-scale:
    runs-on: ubuntu-latest
    needs: pre-commit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            devtools/docker/requirements-dev.txt
            .github/workflows/tests.yml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r devtools/docker/requirements-dev.txt aiohttp async-timeout voluptuous
      - name: Validate quality scale evidence
        run: python scripts/validate_quality_scale.py
      - name: Validate Home Assistant brands assets
        run: python scripts/validate_quality_scale.py --validate-remote-brands
      - name: Validate typed runtime data contract
        run: >
          mypy --strict --ignore-missing-imports --follow-imports=skip
          custom_components/enphase_ev/runtime_data.py
          custom_components/enphase_ev/config_flow.py

  pytest:
    runs-on: ubuntu-latest
    needs: pre-commit
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            devtools/docker/requirements-dev.txt
            .github/workflows/tests.yml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r devtools/docker/requirements-dev.txt aiohttp async-timeout voluptuous
      - name: Run tests
        id: pytest
        continue-on-error: true
        run: pytest --cov=custom_components.enphase_ev --cov-report=term-missing --cov-report=xml --cov-fail-under=95 --junitxml=junit.xml -o junit_family=legacy
      - name: Upload coverage to Codecov
        if: ${{ always() && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: ${{ always() && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          report_type: test_results
      - name: Fail if tests failed
        if: ${{ steps.pytest.outcome == 'failure' }}
        run: exit 1

  targeted-coverage:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: pre-commit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            devtools/docker/requirements-dev.txt
            .github/workflows/tests.yml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r devtools/docker/requirements-dev.txt aiohttp async-timeout voluptuous coverage
      - name: Detect changed integration modules
        id: changed
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t changed < <(
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- "custom_components/enphase_ev/*.py" |
            while IFS= read -r path; do
              [ -f "$path" ] && printf '%s\n' "$path"
            done
          )
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "No changed integration Python modules; skipping targeted coverage."
            echo "include=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf 'Changed integration modules:\n'
          printf '  %s\n' "${changed[@]}"
          include=$(IFS=,; echo "${changed[*]}")
          echo "include=${include}" >> "$GITHUB_OUTPUT"
      - name: Enforce 100% coverage on changed integration modules
        if: ${{ steps.changed.outputs.include != '' }}
        run: |
          COVERAGE_FILE=/tmp/enphase_ev.coverage python -m coverage erase
          COVERAGE_FILE=/tmp/enphase_ev.coverage python -m coverage run -m pytest tests/components/enphase_ev -q
          COVERAGE_FILE=/tmp/enphase_ev.coverage python -m coverage report -m --include="${{ steps.changed.outputs.include }}" --fail-under=100
