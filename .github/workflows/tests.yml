name: Tests

on:
  pull_request:
    paths:
      - 'custom_components/**'
      - 'tests/components/enphase_ev/**'
      - '.pre-commit-config.yaml'
      - '.ruff.toml'
      - '.github/workflows/tests.yml'
  workflow_dispatch:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

concurrency:
  group: ${{ format('{0}-{1}', github.workflow_ref || github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            .pre-commit-config.yaml
            .github/workflows/tests.yml
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
      - name: Run pre-commit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            pre-commit run --from-ref "origin/${{ github.base_ref }}" --to-ref HEAD
          else
            pre-commit run --all-files
          fi

  pytest:
    runs-on: ubuntu-latest
    needs: pre-commit
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: .github/workflows/tests.yml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pytest pytest-asyncio pytest-cov pytest-homeassistant-custom-component "homeassistant>=2024.12.0" aiohttp async-timeout voluptuous
      - name: Run tests
        id: pytest
        continue-on-error: true
        run: pytest --cov=custom_components.enphase_ev --cov-report=term-missing --cov-report=xml --junitxml=junit.xml -o junit_family=legacy
      - name: Upload coverage to Codecov
        if: ${{ always() && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: ${{ always() && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          report_type: test_results
      - name: Fail if tests failed
        if: ${{ steps.pytest.outcome == 'failure' }}
        run: exit 1
