
start_charging:
  name: Start Charging
  description: Start charging on the Enphase Energy charger
  target:
    entity:
      integration: enphase_ev
      domain: button
  fields:
    advanced:
      collapsed: true
      fields:
        charging_level:
          required: false
          selector:
            number:
              min: 6
              max: 40
              step: 1
        connector_id:
          required: false
          selector:
            number:
              min: 1
              max: 2
              step: 1

stop_charging:
  name: Stop Charging
  description: Stop charging on the Enphase Energy charger
  target:
    entity:
      integration: enphase_ev
      domain: button

trigger_message:
  name: Trigger OCPP Message
  target:
    entity:
      integration: enphase_ev
      domain: button
  fields:
    requested_message:
      required: true
      selector:
        text:
          multiline: false
      example: MeterValues
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"

clear_reauth_issue:
  name: Clear Reauth Issue
  description: Manually clear the integration's reauthentication issue notification
  target:
    entity:
      integration: enphase_ev
      domain: sensor
  fields:
    device_id:
      required: false
      selector:
        device:
          integration: enphase_ev
          multiple: true
    site_id:
      required: false
      selector:
        text:
          multiline: false
      example: "1234567"

try_reauth_now:
  name: Try Reauth Now
  description: Use stored credentials to try Enphase reauthentication immediately
  target:
    entity:
      integration: enphase_ev
      domain: sensor
  fields:
    device_id:
      required: false
      selector:
        device:
          integration: enphase_ev
          multiple: true
    site_id:
      required: false
      selector:
        text:
          multiline: false
      example: "1234567"
start_live_stream:
  name: Start Live Stream
  description: Request faster cloud status updates for a short period
  target:
    entity:
      integration: enphase_ev
  fields:
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"

stop_live_stream:
  name: Stop Live Stream
  description: Stop the cloud live stream request
  target:
    entity:
      integration: enphase_ev
  fields:
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"

sync_schedules:
  name: Sync Schedules
  description: Refresh Enphase schedules from the cloud
  fields:
    device_id:
      required: false
      selector:
        device:
          integration: enphase_ev
          multiple: true

force_refresh:
  name: Force Refresh
  description: Refresh battery schedule data from the Enphase cloud immediately
  target:
    entity:
      integration: enphase_ev
  fields:
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"
        config_entry_id:
          required: false
          selector:
            text:
              multiline: false

set_tariff_rate:
  name: Set Tariff Rate
  description: Update one existing Enphase import or export tariff rate value.
  target:
    entity:
      integration: enphase_ev
  fields:
    rate:
      required: true
      selector:
        number:
          min: 0
          step: any

add_schedule:
  name: Add Battery Schedule
  description: Create a battery schedule for CFG, DTG, or RBD
  target:
    entity:
      integration: enphase_ev
  fields:
    schedule_type:
      required: true
      selector:
        select:
          options:
            - cfg
            - dtg
            - rbd
    start_time:
      required: true
      selector:
        time:
    end_time:
      required: true
      selector:
        time:
    limit:
      required: true
      selector:
        number:
          min: 5
          max: 100
          step: 1
          unit_of_measurement: "%"
    days:
      required: true
      selector:
        select:
          multiple: true
          options:
            - label: Monday
              value: "1"
            - label: Tuesday
              value: "2"
            - label: Wednesday
              value: "3"
            - label: Thursday
              value: "4"
            - label: Friday
              value: "5"
            - label: Saturday
              value: "6"
            - label: Sunday
              value: "7"
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"
        config_entry_id:
          required: false
          selector:
            text:
              multiline: false

update_schedule:
  name: Update Battery Schedule
  description: Update a battery schedule by schedule ID
  target:
    entity:
      integration: enphase_ev
  fields:
    schedule_id:
      required: true
      selector:
        text:
          multiline: false
    schedule_type:
      required: true
      selector:
        select:
          options:
            - cfg
            - dtg
            - rbd
    start_time:
      required: true
      selector:
        time:
    end_time:
      required: true
      selector:
        time:
    limit:
      required: true
      selector:
        number:
          min: 5
          max: 100
          step: 1
          unit_of_measurement: "%"
    days:
      required: true
      selector:
        select:
          multiple: true
          options:
            - label: Monday
              value: "1"
            - label: Tuesday
              value: "2"
            - label: Wednesday
              value: "3"
            - label: Thursday
              value: "4"
            - label: Friday
              value: "5"
            - label: Saturday
              value: "6"
            - label: Sunday
              value: "7"
    confirm:
      required: true
      selector:
        boolean:
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"
        config_entry_id:
          required: false
          selector:
            text:
              multiline: false

delete_schedule:
  name: Delete Battery Schedule
  description: Delete one or more battery schedules by schedule ID
  target:
    entity:
      integration: enphase_ev
  fields:
    schedule_id:
      required: false
      selector:
        text:
          multiline: false
    schedule_ids:
      required: false
      example: "sched-1,sched-2"
      selector:
        text:
          multiline: false
    confirm:
      required: true
      selector:
        boolean:
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"
        config_entry_id:
          required: false
          selector:
            text:
              multiline: false

validate_schedule:
  name: Validate Battery Schedule
  description: Validate battery schedule permissions and return the Enphase API response
  target:
    entity:
      integration: enphase_ev
  fields:
    schedule_type:
      required: true
      selector:
        select:
          options:
            - cfg
            - dtg
            - rbd
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"
        config_entry_id:
          required: false
          selector:
            text:
              multiline: false

request_grid_toggle_otp:
  name: Request Grid Toggle OTP
  description: Send a one-time code required for changing site grid mode.
  target:
    entity:
      integration: enphase_ev
  fields:
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"

set_grid_mode:
  name: Set Grid Mode
  description: Change site grid mode using a one-time code.
  target:
    entity:
      integration: enphase_ev
  fields:
    mode:
      required: true
      selector:
        select:
          options:
            - on_grid
            - off_grid
    otp:
      required: true
      selector:
        text:
          multiline: false
    advanced:
      collapsed: true
      fields:
        site_id:
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"

update_cfg_schedule:
  name: Update CFG Schedule
  description: >
    Update the charge-from-grid schedule start time, end time, and/or
    charge limit in a single atomic operation.  Only one API call is
    made to the Enphase cloud, avoiding multiple pending-sync cycles.
    At least one of start_time, end_time, or limit must be provided;
    omitted values are preserved from the current schedule.
  target:
    entity:
      integration: enphase_ev
  fields:
    start_time:
      name: Start Time
      description: CFG schedule start time (HH:MM:SS).
      required: false
      selector:
        time:
    end_time:
      name: End Time
      description: CFG schedule end time (HH:MM:SS).
      required: false
      selector:
        time:
    limit:
      name: Charge Limit
      description: Maximum battery state of charge (%).
      required: false
      selector:
        number:
          min: 5
          max: 100
          step: 1
          unit_of_measurement: "%"
    advanced:
      collapsed: true
      fields:
        site_id:
          name: Site ID
          description: Enphase site ID (optional, resolved from device target).
          required: false
          selector:
            text:
              multiline: false
          example: "1234567"
